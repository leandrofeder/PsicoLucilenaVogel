<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <title>Redirecionando...</title>
    <script>
        (function() {
            const path = window.location.pathname;
            const segments = path.split('/').filter(Boolean);

            // Rotas do site principal (seções do index.html)
            const mainRoutes = ['inicio', 'sobre', 'faq', 'metodo', 'contato'];

            // ── Rota de blog: /blog ou /blog/slug ────────────────────────────────
            if (segments[0] === 'blog') {
                const slug = segments[1] || '';
                const dest = slug ?
                    '/blog.html?post=' + encodeURIComponent(slug) :
                    '/blog.html';
                window.location.replace(dest);
                return;
            }

            // ── Rotas do site principal ───────────────────────────────────────────
            const route = segments[segments.length - 1];
            if (route && mainRoutes.includes(route)) {
                window.location.replace('/index.html?route=' + route);
                return;
            }

            // ── Fallback: página inicial ──────────────────────────────────────────
            window.location.replace('/');
        })();
    </script>
</head>

<body>
    <p>Redirecionando...</p>
</body>

</html>
